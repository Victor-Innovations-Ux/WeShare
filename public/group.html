<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0A0A0A">
    <title>Groupe - WeShare</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/group.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="nav">
        <div class="container">
            <div class="nav-brand">
                <a href="/">
                    <svg class="logo" viewBox="0 0 32 32" fill="none">
                        <circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="2"/>
                        <path d="M16 10L20 15H12L16 10Z" fill="currentColor"/>
                        <circle cx="16" cy="20" r="3" fill="currentColor"/>
                    </svg>
                    <span>WeShare</span>
                </a>
            </div>
            <div class="nav-actions">
                <button id="shareBtn" class="btn btn-icon" aria-label="Partager">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
                        <polyline points="16 6 12 2 8 6"/>
                        <line x1="12" y1="2" x2="12" y2="15"/>
                    </svg>
                </button>
                <button id="uploadBtn" class="btn btn-primary">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                    <span class="btn-text">Ajouter</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Group Header -->
    <header class="group-header">
        <div class="container">
            <h1 id="groupName">Chargement...</h1>
            <div class="group-meta">
                <span id="participantCount">0 participants</span>
                <span class="separator">·</span>
                <span id="photoCount">0 photos</span>
            </div>
        </div>
    </header>

    <!-- Filters -->
    <div class="filters">
        <div class="container">
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all">Toutes</button>
                <button class="filter-btn" data-filter="mine">Mes photos</button>
            </div>
            <div class="view-group">
                <button class="view-btn active" data-view="grid" aria-label="Vue grille">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"/>
                        <rect x="14" y="3" width="7" height="7"/>
                        <rect x="14" y="14" width="7" height="7"/>
                        <rect x="3" y="14" width="7" height="7"/>
                    </svg>
                </button>
                <button class="view-btn" data-view="list" aria-label="Vue liste">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="8" y1="6" x2="21" y2="6"/>
                        <line x1="8" y1="12" x2="21" y2="12"/>
                        <line x1="8" y1="18" x2="21" y2="18"/>
                        <line x1="3" y1="6" x2="3" y2="6"/>
                        <line x1="3" y1="12" x2="3" y2="12"/>
                        <line x1="3" y1="18" x2="3" y2="18"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Photos Grid -->
    <main class="container">
        <div id="photosContainer" class="photos-grid">
            <!-- Photos loaded dynamically -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state" style="display: none;">
            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
            </svg>
            <h3>Aucune photo</h3>
            <p>Soyez le premier à partager un souvenir</p>
            <button class="btn btn-primary" onclick="document.getElementById('uploadBtn').click()">
                Ajouter une photo
            </button>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="loading-state">
            <div class="spinner"></div>
            <p>Chargement...</p>
        </div>
    </main>

    <!-- Upload Modal -->
    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Ajouter des photos</h2>
                <button class="modal-close" aria-label="Fermer">&times;</button>
            </div>
            <div class="modal-body">
                <form id="uploadForm">
                    <div class="upload-area" id="uploadArea">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                        <p>Glissez vos photos ici ou cliquez pour sélectionner</p>
                        <input type="file" id="photoInput" name="photos" accept="image/*" multiple hidden>
                    </div>
                    <div id="previewContainer" class="preview-container"></div>
                    <button type="submit" id="uploadSubmitBtn" class="btn btn-primary btn-full" style="display: none;">
                        Téléverser
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Share Modal -->
    <div id="shareModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Partager le groupe</h2>
                <button class="modal-close" aria-label="Fermer">&times;</button>
            </div>
            <div class="modal-body">
                <p>Partagez ce code avec vos amis :</p>
                <div class="code-display">
                    <span id="shareCodeDisplay"></span>
                    <button id="copyCodeBtn" class="btn btn-small">Copier</button>
                </div>
                <div class="link-display">
                    <input type="text" id="shareLinkInput" readonly>
                    <button id="copyLinkBtn" class="btn btn-small">Copier le lien</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Photo Viewer Modal -->
    <div id="photoViewerModal" class="modal photo-viewer">
        <div class="viewer-content">
            <button class="modal-close" aria-label="Fermer">&times;</button>
            <img id="viewerImage" src="" alt="">
            <div class="photo-info">
                <div class="uploader">
                    <img id="uploaderAvatar" src="" alt="">
                    <span id="uploaderName"></span>
                </div>
                <span id="uploadDate"></span>
            </div>
            <button id="deletePhotoBtn" class="btn btn-danger" style="display: none;">
                Supprimer
            </button>
        </div>
    </div>

    <script src="js/group.js"></script>
</body>
</html>
