; PHP Configuration for WeShare photo uploads
; This file overrides PHP settings for this directory

; Maximum file upload size
upload_max_filesize = 10M

; Maximum POST data size (should be larger than upload_max_filesize)
post_max_size = 12M

; Maximum execution time for upload processing
max_execution_time = 60

; Maximum input time
max_input_time = 60

; Memory limit
memory_limit = 256M
